spring.application.name=smart-campus

# --- Database configuration ---
# Using Environment Variables for security (Standard Practice)
# Set NEON_DB_PASSWORD in your system environment
spring.datasource.url=jdbc:postgresql://ep-round-frost-amsrrabu.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=${NEON_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA/Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- UniFlowX App Security Properties ---
# Set JWT_SECRET_KEY in your system environment
uniflowx.app.jwtSecret=${JWT_SECRET_KEY}
uniflowx.app.jwtExpirationMs=86400000

# --- Spring Security OAuth2 (Google) ---
# Set GOOGLE_CLIENT_SECRET in your system environment
spring.security.oauth2.client.registration.google.client-id=1041773409376-a65g31qo2ouihakqv53kbos2kj435mmo.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-authentication-method=client_secret_basic
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com
